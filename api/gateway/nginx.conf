events {
    worker_connections 1024;
}

http {
    client_max_body_size 20M;

    upstream auth_service {
        server auth-service:8000;
    }

    upstream image_storage {
        server image-storage-service:8001;
    }

    upstream plant_service {
        server plant-service:8002;
    }

    upstream inference {
        server inference-service:8003;
    }

    server {
        listen 80;

        # Internal endpoint used by auth_request — not exposed publicly
        location = /_auth_validate {
            internal;
            proxy_pass              http://auth_service/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Authorization $http_authorization;
            client_max_body_size    0;
        }

        location /auth/ {
            proxy_pass         http://auth_service/auth/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Public: serve stored image files
        location /images/file/ {
            proxy_pass         http://image_storage/images/file/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Auth-protected: upload endpoints
        location /images/upload {
            auth_request        /_auth_validate;

            proxy_pass          http://image_storage;
            proxy_set_header    Host            $host;
            proxy_set_header    X-Real-IP       $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /plants {
            auth_request        /_auth_validate;
            auth_request_set    $user_id $upstream_http_x_user_id;

            proxy_pass          http://plant_service;
            proxy_set_header    Host            $host;
            proxy_set_header    X-Real-IP       $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-User-Id       $user_id;
        }

        location /scans {
            auth_request        /_auth_validate;
            auth_request_set    $user_id $upstream_http_x_user_id;

            proxy_pass          http://plant_service;
            proxy_set_header    Host            $host;
            proxy_set_header    X-Real-IP       $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-User-Id       $user_id;
        }

        location /predict {
            auth_request        /_auth_validate;

            proxy_pass          http://inference/predict;
            proxy_set_header    Host            $host;
            proxy_set_header    X-Real-IP       $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 10M;
        }

        location /advice {
            auth_request        /_auth_validate;

            proxy_pass          http://inference/advice;
            proxy_set_header    Host            $host;
            proxy_set_header    X-Real-IP       $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }
    }
}
